name: Publish — Docker image to GHCR

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name under ghcr.io/<owner>/ (e.g. "chillpass-api"). Lowercased automatically.
        type: string
        required: true
      version:
        description: Semver version for the image (e.g. "1.4.0"). When empty, the workflow no-ops so callers can wire it unconditionally.
        type: string
        required: false
        default: ""
      context:
        description: Docker build context path.
        type: string
        required: false
        default: .
      dockerfile:
        description: Path to the Dockerfile, relative to the repo root.
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Comma-separated build platforms.
        type: string
        required: false
        default: linux/amd64
      build-args:
        description: Newline-separated KEY=VALUE build args.
        type: string
        required: false
        default: ""
      push-latest:
        description: Also tag and push :latest.
        type: boolean
        required: false
        default: true

jobs:
  resolve-runner:
    uses: kethalia/workflows/.github/workflows/resolve-runner.yml@v1.1.1

  publish:
    name: Publish ${{ inputs.image-name }}
    runs-on: ${{ needs.resolve-runner.outputs.heavy }}
    needs: [resolve-runner]
    if: inputs.version != ''
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image reference
        id: ref
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          name="${{ inputs.image-name }}"
          name="${name,,}"
          echo "image=ghcr.io/${owner}/${name}" >> "$GITHUB_OUTPUT"
          echo "short-sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          image="${{ steps.ref.outputs.image }}"
          version="${{ inputs.version }}"
          short="${{ steps.ref.outputs.short-sha }}"
          {
            echo "tags<<EOF"
            echo "${image}:v${version}"
            echo "${image}:sha-${short}"
            if [ "${{ inputs.push-latest }}" = "true" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ inputs.build-args }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}
          cache-from: type=gha,scope=${{ inputs.image-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}
