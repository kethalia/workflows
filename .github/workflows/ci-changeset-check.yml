name: CI — Changeset Check

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: number
        required: false
        default: 22
      base-branch:
        description: Base branch for changeset comparison
        type: string
        required: false
        default: main

jobs:
  resolve-runner:
    uses: ./.github/workflows/resolve-runner.yml

  changeset-check:
    name: Changeset Check
    runs-on: ${{ needs.resolve-runner.outputs.light }}
    needs: [resolve-runner]
    if: github.event_name == 'pull_request'
    steps:
      - uses: kethalia/workflows/.github/actions/setup-pnpm@v1.0.0
        with:
          node-version: ${{ inputs.node-version }}
          fetch-depth: 0
      - run: pnpm changeset status --since=origin/${{ inputs.base-branch }}
