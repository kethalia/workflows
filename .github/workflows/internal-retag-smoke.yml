name: Smoke — retag-image

# Self-contained smoke test for the retag-image reusable. Builds and pushes a
# trivial throwaway image to ghcr.io/chillwhales/retag-smoke-test:src-<run_id>,
# then invokes retag-image.yml to retag it to two run-id-scoped dest tags, then
# asserts byte-identical manifest digests via the workflow's outputs (proves
# `imagetools create` produced manifest-list copies, not rebuilds).

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  resolve-runner:
    uses: ./.github/workflows/resolve-runner.yml

  seed:
    name: Seed throwaway source image
    runs-on: ${{ needs.resolve-runner.outputs.heavy }}
    needs: [resolve-runner]
    permissions:
      contents: read
      packages: write
    outputs:
      source-tag: ${{ steps.tag.outputs.source-tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute throwaway source tag
        id: tag
        run: echo "source-tag=src-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push minimal throwaway image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/chillwhales/retag-smoke-test:${{ steps.tag.outputs.source-tag }}
          context: .
          file: ./.github/workflows/internal-retag-smoke.Dockerfile

  smoke-retag:
    needs: [seed]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/retag-image.yml
    with:
      image: retag-smoke-test
      source-tag: ${{ needs.seed.outputs.source-tag }}
      dest-tags: |
        smoke-${{ github.run_id }}-a
        smoke-${{ github.run_id }}-b

  assert-digests:
    needs: [resolve-runner, smoke-retag]
    runs-on: ${{ needs.resolve-runner.outputs.light }}
    steps:
      - name: Assert source-digest matches every dest-digest
        env:
          SRC: ${{ needs.smoke-retag.outputs.source-digest }}
          DESTS: ${{ needs.smoke-retag.outputs.dest-digests }}
        run: |
          set -euo pipefail
          echo "source-digest=$SRC"
          echo "dest-digests=$DESTS"
          mismatch=$(jq -r --arg s "$SRC" '[.[] | select(.digest != $s)] | length' <<<"$DESTS")
          if [ "$mismatch" != "0" ]; then
            echo "::error::Smoke retag produced rebuilt images (digest drift)" >&2
            exit 1
          fi
          echo "All dest digests match source — retag is byte-identical."
