name: Build and Upload
description: Run a build command and upload the output as an artifact

inputs:
  build-command:
    description: The build command to run (e.g., "pnpm build")
    required: true
  artifact-name:
    description: Name for the uploaded artifact
    required: false
    default: "build-output"
  artifact-paths:
    description: Newline-separated paths to include in the artifact
    required: true
  retention-days:
    description: Number of days to retain the artifact
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - name: Build
      shell: bash
      run: ${{ inputs.build-command }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-paths }}
        retention-days: ${{ inputs.retention-days }}
